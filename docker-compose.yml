services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=django-insecure-development-key-change-in-production
      - DEBUG=True
      - API_BASE_URL=/api
    volumes:
      - .:/app
    command: sh -c "python manage.py migrate && python manage.py populate_inventory && python manage.py runserver 0.0.0.0:8000"
