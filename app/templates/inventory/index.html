<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Kho</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .card h3 {
            color: var(--text-muted);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .card .value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .section {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
        }

        .section h2 {
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        .table-wrap {
            overflow-x: auto;
        }

        th {
            text-align: left;
            color: var(--text-muted);
            font-weight: 400;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input, select, textarea {
            width: 100%;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: var(--text);
            font-family: inherit;
        }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge-danger { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            transform: translateY(200%);
            transition: transform 0.3s;
        }

        #toast.show { transform: translateY(0); }

        @media (max-width: 900px) {
            body {
                padding: 1rem;
            }

            header {
                align-items: flex-start;
                flex-direction: column;
                gap: 1rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Quản Lý Kho</h1>
            <div id="health-status">
                <span class="badge badge-success">Hệ Thống Hoạt Động</span>
            </div>
        </header>

        <div class="stats">
            <div class="card">
                <h3>Tổng Sản Phẩm</h3>
                <div class="value" id="total-items">0</div>
            </div>
            <div class="card">
                <h3>Tổng Tồn Kho</h3>
                <div class="value" id="total-stock">0</div>
            </div>
            <div class="card">
                <h3>Lịch Sử Hôm Nay</h3>
                <div class="value" id="today-logs">0</div>
            </div>
        </div>

        <div class="grid">
            <div class="section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2>Tồn Kho Hiện Tại</h2>
                    <button class="btn" onclick="showAddItem()">+ Thêm Sản Phẩm</button>
                </div>
                <div class="table-wrap">
                    <table id="items-table">
                        <thead>
                            <tr>
                                <th>Tên</th>
                                <th>Mã SKU</th>
                                <th>Tồn Kho</th>
                                <th>Giá (VNĐ)</th>
                                <th>Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody id="items-body">
                            <!-- Items will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="section">
                <h2>Nhập / Xuất Kho</h2>
                <form id="stock-form">
                    <div class="form-group">
                        <label>Sản Phẩm</label>
                        <select id="stock-item-select" required>
                            <option value="">Chọn Sản Phẩm</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Loại Giao Dịch</label>
                        <select id="stock-type" required>
                            <option value="IN">Nhập Kho (+)</option>
                            <option value="OUT">Xuất Kho (-)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Số Lượng</label>
                        <input type="number" id="stock-quantity" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>Ghi Chú</label>
                        <textarea id="stock-note" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Xử Lý Giao Dịch</button>
                </form>

                <h2 style="margin-top: 2rem;">Lịch Sử Gần Đây</h2>
                <div id="logs-list">
                    <!-- Logs will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add Item Modal Placeholder -->
    <div id="add-item-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center;">
        <div class="section" style="width: 400px;">
            <h2>Thêm Sản Phẩm Mới</h2>
            <form id="add-item-form">
                <div class="form-group">
                    <label>Tên Sản Phẩm</label>
                    <input type="text" id="new-item-name" required>
                </div>
                <div class="form-group">
                    <label>Mã SKU</label>
                    <input type="text" id="new-item-sku" required>
                </div>
                <div class="form-group">
                    <label>Giá (VNĐ)</label>
                    <input type="number" id="new-item-price" step="1000" value="0">
                </div>
                <div style="display:flex; gap: 1rem;">
                    <button type="submit" class="btn">Lưu</button>
                    <button type="button" class="btn btn-outline" onclick="hideAddItem()">Hủy</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast">Thông báo</div>

    <script>
        const API_BASE = '{{ API_BASE_URL|escapejs }}';

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function fetchData(endpoint) {
            const res = await fetch(`${API_BASE}${endpoint}`);
            if (!res.ok) {
                throw new Error(`Request failed: ${res.status}`);
            }

            const data = await res.json();
            return Array.isArray(data) ? data : data.results;
        }

        async function loadItems() {
            const items = await fetchData('/items/');
            const body = document.getElementById('items-body');
            const select = document.getElementById('stock-item-select');
            
            body.innerHTML = '';
            select.innerHTML = '<option value="">Chọn Sản Phẩm</option>';
            
            let totalItems = items.length;
            let totalStock = 0;

            items.forEach(item => {
                totalStock += item.stock_quantity;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td></td>
                    <td><code></code></td>
                    <td><span class="badge"></span></td>
                    <td></td>
                    <td><button class="btn btn-outline" style="padding: 0.25rem 0.5rem">Xóa</button></td>
                `;
                row.children[0].textContent = item.name;
                row.children[1].querySelector('code').textContent = item.sku;

                const stockBadge = row.children[2].querySelector('.badge');
                stockBadge.classList.add(item.stock_quantity > 10 ? 'badge-success' : 'badge-danger');
                stockBadge.textContent = item.stock_quantity;

                row.children[3].textContent = `${parseFloat(item.price).toLocaleString('vi-VN')} VNĐ`;
                row.children[4].querySelector('button').onclick = () => deleteItem(item.id);
                body.appendChild(row);

                const opt = document.createElement('option');
                opt.value = item.id;
                opt.textContent = item.name;
                select.appendChild(opt);
            });

            document.getElementById('total-items').textContent = totalItems;
            document.getElementById('total-stock').textContent = totalStock;
        }

        async function loadLogs() {
            const logs = await fetchData('/stock-logs/');
            const list = document.getElementById('logs-list');
            list.innerHTML = '';
            
            const today = new Date().toLocaleDateString('vi-VN');
            const todayLogs = logs.filter(log => new Date(log.timestamp).toLocaleDateString('vi-VN') === today);
            document.getElementById('today-logs').textContent = todayLogs.length;

            logs.slice(0, 5).forEach(log => {
                const typeText = log.transaction_type === 'IN' ? 'NHẬP' : 'XUẤT';
                const div = document.createElement('div');
                div.style.padding = '0.75rem';
                div.style.borderBottom = '1px solid var(--border)';
                const header = document.createElement('div');
                header.style.display = 'flex';
                header.style.justifyContent = 'space-between';

                const name = document.createElement('strong');
                name.textContent = log.item_name;

                const badge = document.createElement('span');
                badge.className = log.transaction_type === 'IN' ? 'badge-success' : 'badge-danger';
                badge.textContent = `${typeText} ${log.quantity}`;

                const time = document.createElement('small');
                time.style.color = 'var(--text-muted)';
                time.textContent = new Date(log.timestamp).toLocaleString('vi-VN');

                header.append(name, badge);
                div.append(header, time);
                list.appendChild(div);
            });
        }

        function showAddItem() { document.getElementById('add-item-modal').style.display = 'flex'; }
        function hideAddItem() { document.getElementById('add-item-modal').style.display = 'none'; }

        document.getElementById('add-item-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('new-item-name').value,
                sku: document.getElementById('new-item-sku').value,
                price: document.getElementById('new-item-price').value
            };

            const res = await fetch(`${API_BASE}/items/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                showToast('Đã thêm sản phẩm thành công');
                hideAddItem();
                loadItems();
                e.target.reset();
            } else {
                showToast('Lỗi khi thêm sản phẩm');
            }
        };

        document.getElementById('stock-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                item: document.getElementById('stock-item-select').value,
                transaction_type: document.getElementById('stock-type').value,
                quantity: document.getElementById('stock-quantity').value,
                note: document.getElementById('stock-note').value
            };

            const res = await fetch(`${API_BASE}/stock-logs/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                showToast('Giao dịch đã được xử lý');
                loadItems();
                loadLogs();
                e.target.reset();
            } else {
                showToast('Lỗi khi xử lý giao dịch');
            }
        };

        async function deleteItem(id) {
            if (confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')) {
                await fetch(`${API_BASE}/items/${id}/`, { method: 'DELETE' });
                loadItems();
                showToast('Đã xóa sản phẩm');
            }
        }

        // Khởi tạo
        loadItems();
        loadLogs();
    </script>
</body>
</html>
