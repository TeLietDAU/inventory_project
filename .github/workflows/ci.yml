name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Run lint
        run: |
          flake8 app/ --max-line-length=120 --exclude=migrations

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    env:
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: "True"
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: db.sqlite3
      API_BASE_URL: /api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test app --verbosity=2

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t inventory-management:${{ github.sha }} .

      - name: Verify image built
        run: docker images inventory-management