services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=django-insecure-development-key-change-in-production
      - DEBUG=True
      - API_BASE_URL=/api
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
    volumes:
      - .:/app
    command: sh -c "python manage.py migrate && python manage.py populate_inventory && python manage.py runserver 0.0.0.0:8000"
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - web
